<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Swastik Prime Realtors — Premier real estate advisory in Central India." />
  <title>Swastik Prime Realtors — Central India's Premier Real Estate Advisory</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
</head>
<body>
  <div id="loader" class="loader">
    <div class="loader-inner">
      <div class="loader-logo">SWASTIK PRIME</div>
      <div class="loader-bar"><div class="loader-progress"></div></div>
      <div class="loader-text">Loading Experience...</div>
    </div>
  </div>
  <div id="cursor" class="cursor"></div>
  <div id="cursor-follower" class="cursor-follower"></div>
  <canvas id="webgl-canvas"></canvas>
  <button id="audio-toggle" class="audio-toggle" aria-label="Toggle ambient audio">
    <span class="audio-icon">♪</span>
  </button>
  <main id="smooth-content">
    <section id="hero" class="section section--hero" data-section="hero"></section>
    <section id="services" class="section section--services" data-section="services"></section>
    <section id="ai-report" class="section section--ai-report" data-section="ai-report"></section>
    <section id="why-us" class="section section--why-us" data-section="why-us"></section>
    <section id="testimonials" class="section section--testimonials" data-section="testimonials"></section>
    <section id="contact" class="section section--contact" data-section="contact"></section>
    <footer class="footer"></footer>
  </main>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
